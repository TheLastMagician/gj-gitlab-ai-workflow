image: python:3.12-slim

stages:
  - policy
  - workflow
  - test
  - package
  - release

default:
  before_script:
    - python --version

policy_check:
  stage: policy
  script:
    - python scripts/policy_check.py --mr-description examples/demo-run/mr/merge-request.md --changed-files examples/demo-run/mr/changed-files.txt

workflow_contract:
  stage: workflow
  script:
    - python orchestrator/orchestrator.py < examples/demo-run/payloads/note-ai-review-mr.json
    - python scripts/ci_workflow_summary.py --output build/ci-workflow-summary.md
  artifacts:
    when: always
    paths:
      - build/ci-workflow-summary.md

installer_dry_run:
  stage: test
  script:
    - python scripts/validate_skills.py
    - python scripts/install_skills.py --dry-run

workflow_package_check:
  stage: package
  script:
    - python scripts/package_open_source.py --output dist/gj-gitlab-ai-workflow.zip
  artifacts:
    when: always
    paths:
      - dist/gj-gitlab-ai-workflow.zip

release_dry_run:
  stage: release
  script:
    - python scripts/release_dry_run.py --package dist/gj-gitlab-ai-workflow.zip --output build/release-dry-run.md
  artifacts:
    when: always
    paths:
      - build/release-dry-run.md
