rules:
  - id: database
    paths:
      - "db/migration/**"
      - "**/migrations/**"
    standards:
      - "docs/standards/04-database-standard.md"
      - "docs/standards/06-release-standard.md"
    minimum_flow: "standard"

  - id: security
    paths:
      - "src/**/auth/**"
      - "src/**/permission/**"
      - "orchestrator/**"
    standards:
      - "docs/standards/08-security-standard.md"
    minimum_flow: "standard"

  - id: workflow-policy
    paths:
      - ".gitlab-ci.yml"
      - "scripts/policy_check.py"
      - "templates/**"
      - "docs/standards/**"
      - ".ai/**"
    standards:
      - "docs/standards/05-review-standard.md"
      - "docs/standards/09-ai-development-boundary.md"
    minimum_flow: "standard"
