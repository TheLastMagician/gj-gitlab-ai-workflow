image: python:3.12-slim

stages:
  - policy
  - workflow
  - test
  - deploy
  - release

default:
  before_script:
    - python --version

policy_check:
  stage: policy
  script:
    - python scripts/policy_check.py

workflow_assets_check:
  stage: workflow
  script:
    - python scripts/workflow_assets_check.py
    - python scripts/validate_role_map.py

smoke_check:
  stage: test
  script:
    - python scripts/smoke_check.py

