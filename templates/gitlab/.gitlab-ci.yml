image: python:3.12-slim

stages:
  - policy
  - workflow
  - test
  - deploy
  - release

default:
  before_script:
    - python --version

policy_check:
  stage: policy
  script:
    - python scripts/policy_check.py

workflow_assets_check:
  stage: workflow
  script:
    - python scripts/workflow_assets_check.py

validate_role_map:
  stage: workflow
  rules:
    - if: '$GJ_VALIDATE_ROLE_MAP == "1"'
  script:
    - python scripts/validate_role_map.py

context_freshness_check:
  stage: workflow
  rules:
    - exists:
        - scripts/context_freshness_check.py
      changes:
        - .ai/context-index.yml
        - docs/context/**/*
        - docs/modules/**/*
        - docs/iterations/**/*
  script:
    - python scripts/context_freshness_check.py

# AI 评审占位:配置 GJ_AI_REVIEW_TOKEN 后自动生效,未配置时跳过。
# 产出仅作评论建议(advisory),不阻塞合并——见 09-ai-development-boundary。
ai_review:
  stage: workflow
  allow_failure: true
  rules:
    - if: '$CI_MERGE_REQUEST_IID && $GJ_AI_REVIEW_TOKEN'
  script:
    - echo "TODO: call your AI CLI here, e.g.:"
    - echo "  claude -p \"Review this MR diff against docs/standards/05-review-standard.md\" > review.md"
    - echo "  then post review.md as an MR comment via the GitLab API."

smoke_check:
  stage: test
  script:
    - python scripts/smoke_check.py

