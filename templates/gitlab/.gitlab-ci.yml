image: python:3.12-slim

stages:
  - policy
  - workflow
  - test
  - release

default:
  before_script:
    - python --version

policy_check:
  stage: policy
  script:
    - python scripts/policy_check.py

workflow_assets_check:
  stage: workflow
  script:
    - python scripts/workflow_assets_check.py

smoke_check:
  stage: test
  script:
    - python scripts/smoke_check.py

release_dry_run:
  stage: release
  script:
    - python scripts/release_dry_run.py --output build/release-dry-run.md
  artifacts:
    when: always
    paths:
      - build/release-dry-run.md
