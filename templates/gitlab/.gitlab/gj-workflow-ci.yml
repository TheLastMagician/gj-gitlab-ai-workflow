variables:
  GJ_CI_IMAGE: "python:3.12-slim"

.gj_python_job:
  image: $GJ_CI_IMAGE
  before_script:
    - python --version

policy_check:
  extends: .gj_python_job
  stage: .pre
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - python scripts/policy_check.py

workflow_assets_check:
  extends: .gj_python_job
  stage: .pre
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - python scripts/workflow_assets_check.py

validate_role_map:
  extends: .gj_python_job
  stage: .pre
  rules:
    - if: '$GJ_VALIDATE_ROLE_MAP == "1"'
    - when: never
  script:
    - python scripts/validate_role_map.py

smoke_check:
  extends: .gj_python_job
  stage: .pre
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - python scripts/smoke_check.py

release_version_check:
  extends: .gj_python_job
  stage: .pre
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: never
  script:
    - python scripts/release_version_check.py

release_dry_run:
  extends: .gj_python_job
  stage: .post
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - python scripts/release_dry_run.py --output build/release-dry-run.md
  artifacts:
    when: always
    paths:
      - build/release-dry-run.md
