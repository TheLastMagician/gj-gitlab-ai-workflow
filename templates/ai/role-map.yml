version: 1

roles:
  product:
    description: "Owns requirement intent and acceptance criteria."
    gitlab_users: ["@product-owner"]
    notification_channels: ["gitlab"]

  tech_lead:
    description: "Owns solution review, risk decisions, and task split quality."
    gitlab_users: ["@tech-lead"]
    notification_channels: ["gitlab"]

  developer:
    description: "Owns implementation, self-test, and MR updates."
    gitlab_users: ["@developer"]
    notification_channels: ["gitlab"]

  reviewer:
    description: "Owns MR review and approval decision."
    gitlab_users: ["@reviewer"]
    notification_channels: ["gitlab"]

  qa:
    description: "Owns acceptance, regression, and failed-test feedback."
    gitlab_users: ["@qa-owner"]
    notification_channels: ["gitlab"]

  devops:
    description: "Owns deployment readiness, environment locks, and rollback checks."
    gitlab_users: ["@devops-owner"]
    notification_channels: ["gitlab"]

  pm:
    description: "Owns milestone tracking, release coordination, and retro closure."
    gitlab_users: ["@pm-owner"]
    notification_channels: ["gitlab"]

handoff_policy:
  source_of_truth: "gitlab"
  use_gitlab_todos: true
  require_assignee_for_human_steps: true
  require_reviewer_for_mr_review: true
  require_mention_on_handoff: true
  require_due_date_when_time_bound: true
  external_notification_note: >
    Company channels such as Enterprise WeCom or email may deliver GitLab
    notifications, but workflow automation should read GitLab API state.
