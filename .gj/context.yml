version: 1

global:
  always_load:
    - "docs/context/current-state.md"
    - "docs/context/module-map.md"
    - "docs/context/glossary.md"

context_budget:
  max_always_load_files: 3
  max_always_load_chars: 24000
  max_module_docs_per_module: 5
  max_module_context_chars: 40000

modules:
  order:
    name: 订单模块
    paths:
      - "examples/demo-project/src/**"
      - "examples/demo-project/tests/**"
      - "docs/modules/order.md"
    docs:
      - "docs/modules/order.md"
    active_decisions: []
    ai_focus:
      - "申请人不得审批自己的订单"
      - "审批状态转换必须可追溯"
