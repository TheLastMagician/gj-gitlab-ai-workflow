version: 1

global:
  always_load:
    - "docs/context/current-state.md"
    - "docs/context/module-map.md"
    - "docs/context/glossary.md"

context_budget:
  max_always_load_files: 3
  max_always_load_chars: 24000
  max_module_docs_per_module: 5
  max_module_context_chars: 40000
  allow_iteration_archives_in_always_load: false

modules:
  order:
    name: 订单模块
    paths:
      - "examples/demo-project/src/**"
      - "examples/demo-project/tests/**"
      - "docs/modules/order.md"
    docs:
      - "docs/modules/order.md"
    active_decisions: []
    recent_iteration_summaries:
      - "docs/iterations/2026-07-v1.0-order-approval/ai-context-summary.md"
    ai_focus:
      - "申请人不得审批自己的订单"
      - "审批状态转换必须可追溯"

iteration_policy:
  require_ai_context_summary: true
  update_current_state_on_release: true
  max_recent_summaries_per_module: 1
