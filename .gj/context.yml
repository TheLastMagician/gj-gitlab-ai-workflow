version: 1

global:
  always_load:
    - "docs/context/current-state.md"
    - "docs/context/module-map.md"
    - "docs/context/glossary.md"

context_budget:
  max_always_load_files: 3
  max_always_load_chars: 24000
  max_module_docs_per_module: 5
  max_module_context_chars: 40000

modules:
  workflow-assets:
    name: 工作流安装资产
    paths:
      - "templates/**"
      - ".gitlab/**"
      - ".gj/**"
      - "CODEOWNERS"
    docs:
      - "docs/workflow.md"
      - "docs/documentation-governance.md"
      - "docs/versioning.md"
    active_decisions: []
    ai_focus:
      - "安装资产必须保持业务领域无关"
      - "安装器不能覆盖或删除业务项目已有内容"

  skills:
    name: 跨 Agent Skills
    paths:
      - "skills/**"
      - "skills.sh.json"
    docs:
      - "docs/skills.md"
      - "docs/workflow.md"
    active_decisions: []
    ai_focus:
      - "AI 起草一切，人确认 flow、合并和发布"

  tooling:
    name: 工具与自动化
    paths:
      - "scripts/**"
      - "orchestrator/**"
      - "tests/**"
      - ".gitlab-ci.yml"
    docs:
      - "docs/cicd.md"
      - "docs/gitlab-access.md"
    active_decisions: []
    ai_focus:
      - "硬门禁与提醒检查必须明确区分"

  examples:
    name: 隔离示例
    paths:
      - "examples/**"
    docs:
      - "examples/order-demo/README.md"
      - "examples/order-demo/docs/modules/order.md"
    active_decisions: []
    ai_focus:
      - "示例事实不能进入通用安装模板"
